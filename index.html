<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek 智能伴侣 · 移动优化版</title>
    <script src="https://cdn.jsdelivr.net/npm/localforage@1.10.0/dist/localforage.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #f7f7f8;
            --bg-secondary: #ffffff;
            --surface: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --user-bubble: #0084ff;
            --user-text: #ffffff;
            --assistant-bubble: #e5e5ea;
            --assistant-text: #1f2937;
            --accent: #10a37f;
            --sidebar-bg: #ffffff;
        }

        body.dark {
            --bg-primary: #1e1e2f;
            --bg-secondary: #2a2a3a;
            --surface: #2a2a3a;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border: #3f3f4e;
            --user-bubble: #3b82f6;
            --assistant-bubble: #3f3f4e;
            --assistant-text: #f3f4f6;
            --sidebar-bg: #252536;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.2s, color 0.2s;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            z-index: 1000;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-sidebar {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .role-manager, .conversation-list, .settings-section, .backup-section {
            padding: 12px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin: 12px 0 8px 0;
            color: var(--text-secondary);
        }

        .role-item, .conv-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 6px;
            background: var(--bg-primary);
        }

        .role-item.active, .conv-item.active {
            background: var(--accent);
            color: white;
        }

        .role-name, .conv-name {
            flex: 1;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            color: var(--text-secondary);
        }

        .add-btn {
            background: var(--accent);
            color: white;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            margin-top: 8px;
            width: 100%;
            border: none;
        }

        /* 模式切换和主题按钮（侧边栏内） */
        .mode-switch-side {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .mode-btn-side {
            flex: 1;
            text-align: center;
            padding: 8px;
            border-radius: 28px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        .mode-btn-side.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .theme-btn-side {
            width: 100%;
            padding: 8px;
            border-radius: 28px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            margin-top: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 14px;
        }

        .backup-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .backup-btn {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
        }

        /* 聊天主区域 */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
        }

        /* 精简头部：只保留菜单、当前信息、API按钮 */
        .chat-header {
            padding: 8px 12px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .menu-btn {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-primary);
            line-height: 1;
        }
        .current-info {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .api-icon-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-primary);
            padding: 4px;
        }

        /* 消息区域 */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .message.user { align-self: flex-end; }
        .message.assistant { align-self: flex-start; }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }
        .user .bubble {
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
        }
        .assistant .bubble {
            background: var(--assistant-bubble);
            color: var(--assistant-text);
            border-bottom-left-radius: 4px;
        }
        .msg-actions {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            justify-content: flex-end;
        }
        .assistant .msg-actions { justify-content: flex-start; }
        .msg-action-btn {
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
        }

        /* 输入区域固定在底部 */
        .input-area {
            padding: 10px 12px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
        }
        #messageInput {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
        }
        #sendBtn {
            background: var(--accent);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--assistant-bubble);
            border-radius: 18px;
            width: fit-content;
        }

        /* 模态框 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.show {
            visibility: visible;
            opacity: 1;
        }
        .modal-content {
            background: var(--surface);
            width: 90%;
            max-width: 340px;
            border-radius: 24px;
            padding: 20px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            margin: 12px 0;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        button {
            background: var(--accent);
            border: none;
            padding: 8px 16px;
            border-radius: 24px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="app">
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>📁 历史 & 设置</span>
            <button class="close-sidebar" id="closeSidebarBtn">✕</button>
        </div>
        <div class="role-manager">
            <div class="section-title">🎭 角色卡</div>
            <div id="roleList"></div>
            <button id="addRoleBtn" class="add-btn">+ 新建角色</button>
        </div>
        <div class="conversation-list">
            <div class="section-title">💬 对话历史</div>
            <div id="convList"></div>
            <button id="newConvBtn" class="add-btn">+ 新对话</button>
        </div>
        <!-- 设置区域：模式切换 + 主题切换 -->
        <div class="settings-section">
            <div class="section-title">⚙️ 设置</div>
            <div class="mode-switch-side" id="modeSwitchSide">
                <div class="mode-btn-side" data-mode="fast">⚡ 快速</div>
                <div class="mode-btn-side" data-mode="deep">🧠 深度思考</div>
            </div>
            <div class="theme-btn-side" id="themeBtnSide">🌙 夜间模式</div>
        </div>
        <div class="backup-section">
            <div class="section-title">💾 备份与恢复</div>
            <div class="backup-buttons">
                <button id="exportBackupBtn" class="backup-btn">📤 导出备份</button>
                <button id="importBackupBtn" class="backup-btn">📥 导入备份</button>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display:none;" />
        </div>
    </div>

    <!-- 聊天主界面 -->
    <div class="chat-main">
        <div class="chat-header">
            <button class="menu-btn" id="menuBtn">☰</button>
            <div class="current-info" id="currentInfo">加载中...</div>
            <button class="api-icon-btn" id="apiSettingsBtn">🔑</button>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="loading" id="loadingIndicator" style="display:none;">🤖 AI 思考中...</div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>
</div>

<!-- 模态框 -->
<div id="apiModal" class="modal">
    <div class="modal-content">
        <h3>DeepSeek API Key</h3>
        <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxx">
        <div class="modal-buttons">
            <button id="saveApiBtn">保存</button>
            <button id="closeApiBtn">取消</button>
        </div>
    </div>
</div>

<div id="roleModal" class="modal">
    <div class="modal-content">
        <h3 id="roleModalTitle">角色信息</h3>
        <input type="text" id="roleName" placeholder="角色名称">
        <textarea id="rolePrompt" rows="3" placeholder="系统提示词"></textarea>
        <input type="text" id="roleAvatar" placeholder="头像emoji (默认🤖)">
        <div class="modal-buttons">
            <button id="confirmRoleBtn">确认</button>
            <button id="cancelRoleBtn">取消</button>
        </div>
    </div>
</div>

<script>
    // ---------- 存储KEY ----------
    const STORAGE_KEYS = {
        ROLES: 'deepseek_roles',
        CONVERSATIONS: 'deepseek_conversations',
        CURRENT_ROLE_ID: 'deepseek_current_role',
        CURRENT_CONV_ID: 'deepseek_current_conv',
        API_KEY: 'deepseek_api_key',
        THEME: 'deepseek_theme',
        MODE: 'deepseek_mode'
    };
    const DEFAULT_ROLES = [
        { id: 'role_1', name: '默认助手', systemPrompt: '你是一个有帮助的AI助手。', avatar: '🤖' },
        { id: 'role_2', name: '诗人', systemPrompt: '你是一位浪漫的诗人，用优美的语言回答。', avatar: '📖' }
    ];

    let roles = [], conversations = [], currentRoleId = null, currentConversationId = null, apiKey = '', currentMode = 'fast';

    // DOM
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menuBtn');
    const closeSidebarBtn = document.getElementById('closeSidebarBtn');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const loadingDiv = document.getElementById('loadingIndicator');
    const roleListDiv = document.getElementById('roleList');
    const convListDiv = document.getElementById('convList');
    const addRoleBtn = document.getElementById('addRoleBtn');
    const newConvBtn = document.getElementById('newConvBtn');
    const apiSettingsBtn = document.getElementById('apiSettingsBtn');
    const currentInfoSpan = document.getElementById('currentInfo');
    const exportBackupBtn = document.getElementById('exportBackupBtn');
    const importBackupBtn = document.getElementById('importBackupBtn');
    const importFileInput = document.getElementById('importFileInput');
    const apiModal = document.getElementById('apiModal');
    const roleModal = document.getElementById('roleModal');
    const modeSwitchSide = document.getElementById('modeSwitchSide');
    const themeBtnSide = document.getElementById('themeBtnSide');
    let editingRoleId = null;

    // IndexedDB 封装
    async function saveData(key, value) {
        try { await localforage.setItem(key, value); } catch(e) { alert('保存失败: '+e.message); }
    }
    async function loadData(key, defaultValue) {
        try { const v = await localforage.getItem(key); return v !== null ? v : defaultValue; } catch(e) { return defaultValue; }
    }
    async function saveAll() {
        await Promise.all([
            saveData(STORAGE_KEYS.ROLES, roles),
            saveData(STORAGE_KEYS.CONVERSATIONS, conversations),
            saveData(STORAGE_KEYS.CURRENT_ROLE_ID, currentRoleId),
            saveData(STORAGE_KEYS.CURRENT_CONV_ID, currentConversationId),
            saveData(STORAGE_KEYS.API_KEY, apiKey),
            saveData(STORAGE_KEYS.THEME, document.body.classList.contains('dark') ? 'dark' : 'light'),
            saveData(STORAGE_KEYS.MODE, currentMode)
        ]);
    }

    async function loadDataFromLocal() {
        roles = await loadData(STORAGE_KEYS.ROLES, DEFAULT_ROLES);
        conversations = await loadData(STORAGE_KEYS.CONVERSATIONS, []);
        currentRoleId = await loadData(STORAGE_KEYS.CURRENT_ROLE_ID, null);
        currentConversationId = await loadData(STORAGE_KEYS.CURRENT_CONV_ID, null);
        apiKey = await loadData(STORAGE_KEYS.API_KEY, '');
        const savedTheme = await loadData(STORAGE_KEYS.THEME, 'light');
        if (savedTheme === 'dark') document.body.classList.add('dark');
        currentMode = await loadData(STORAGE_KEYS.MODE, 'fast');
        if (!roles.length) roles = DEFAULT_ROLES;
        if (!currentRoleId || !roles.find(r=>r.id===currentRoleId)) currentRoleId = roles[0]?.id;
        for (let role of roles) {
            if (!conversations.some(c=>c.roleId===role.id)) {
                conversations.push({ id: 'conv_'+Date.now()+'_'+Math.random(), roleId: role.id, name: '新对话', messages: [] });
            }
        }
        let convValid = conversations.find(c=>c.id===currentConversationId && c.roleId===currentRoleId);
        if (!convValid) {
            let first = conversations.find(c=>c.roleId===currentRoleId);
            currentConversationId = first ? first.id : (()=>{ let n='conv_'+Date.now(); conversations.push({id:n,roleId:currentRoleId,name:'新对话',messages:[]}); return n; })();
        }
        await saveAll();
    }

    function setMode(mode) {
        currentMode = mode;
        saveData(STORAGE_KEYS.MODE, mode);
        document.querySelectorAll('.mode-btn-side').forEach(btn => {
            if (btn.dataset.mode === mode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    function getModeParams() {
        if (currentMode === 'deep') return { temperature:0.3, max_tokens:2048, extra_system:" 请你深度思考，分步骤推理，给出详细解答。" };
        return { temperature:0.8, max_tokens:1024, extra_system:" 请简洁高效回答。" };
    }
    function getCurrentConversation() { return conversations.find(c=>c.id===currentConversationId); }
    function getCurrentRole() { return roles.find(r=>r.id===currentRoleId); }

    function renderUI() { renderRoleList(); renderConvList(); renderMessages(); updateHeaderInfo(); setMode(currentMode); }
    function updateHeaderInfo() {
        const role = getCurrentRole();
        const conv = getCurrentConversation();
        currentInfoSpan.innerText = `${role?.avatar||'🎭'} ${role?.name||'角色'} · ${conv?.name||'对话'}`;
    }

    function renderRoleList() {
        roleListDiv.innerHTML = '';
        roles.forEach(role => {
            const div = document.createElement('div');
            div.className = `role-item ${currentRoleId===role.id?'active':''}`;
            div.innerHTML = `<span class="role-name">${role.avatar||'👤'} ${escapeHtml(role.name)}</span>
                <div class="role-actions"><button class="icon-btn edit-role" data-id="${role.id}">✏️</button><button class="icon-btn delete-role" data-id="${role.id}">🗑️</button></div>`;
            div.addEventListener('click', (e) => { if(!e.target.classList.contains('edit-role') && !e.target.classList.contains('delete-role')) switchRole(role.id); });
            roleListDiv.appendChild(div);
        });
        document.querySelectorAll('.edit-role').forEach(btn => btn.addEventListener('click', (e)=>{ e.stopPropagation(); openRoleModal(btn.dataset.id); }));
        document.querySelectorAll('.delete-role').forEach(btn => btn.addEventListener('click', async (e)=>{
            e.stopPropagation();
            if(roles.length<=1) { alert('至少保留一个角色'); return; }
            if(confirm('删除角色会同时删除其所有对话')) {
                roles = roles.filter(r=>r.id!==btn.dataset.id);
                conversations = conversations.filter(c=>c.roleId!==btn.dataset.id);
                if(currentRoleId===btn.dataset.id) {
                    currentRoleId = roles[0].id;
                    let fc = conversations.find(c=>c.roleId===currentRoleId);
                    currentConversationId = fc ? fc.id : createNewConversationForRole(currentRoleId);
                }
                await saveAll(); renderUI();
            }
        }));
    }

    function renderConvList() {
        convListDiv.innerHTML = '';
        conversations.filter(c=>c.roleId===currentRoleId).forEach(conv => {
            const div = document.createElement('div');
            div.className = `conv-item ${currentConversationId===conv.id?'active':''}`;
            div.innerHTML = `<span class="conv-name">💬 ${escapeHtml(conv.name)}</span>
                <div class="conv-actions"><button class="icon-btn rename-conv" data-id="${conv.id}">✏️</button><button class="icon-btn delete-conv" data-id="${conv.id}">🗑️</button></div>`;
            div.addEventListener('click', (e) => { if(!e.target.classList.contains('rename-conv') && !e.target.classList.contains('delete-conv')) switchConversation(conv.id); });
            convListDiv.appendChild(div);
        });
        document.querySelectorAll('.rename-conv').forEach(btn => btn.addEventListener('click', async (e)=>{
            e.stopPropagation();
            let newName = prompt('新名称', conversations.find(c=>c.id===btn.dataset.id)?.name);
            if(newName) { conversations.find(c=>c.id===btn.dataset.id).name = newName.slice(0,20); await saveAll(); renderConvList(); updateHeaderInfo(); }
        }));
        document.querySelectorAll('.delete-conv').forEach(btn => btn.addEventListener('click', async (e)=>{
            e.stopPropagation();
            let roleConvs = conversations.filter(c=>c.roleId===currentRoleId);
            if(roleConvs.length<=1) { alert('每个角色至少保留一个对话'); return; }
            conversations = conversations.filter(c=>c.id!==btn.dataset.id);
            if(currentConversationId===btn.dataset.id) currentConversationId = conversations.find(c=>c.roleId===currentRoleId).id;
            await saveAll(); renderUI();
        }));
    }

    async function switchRole(roleId) {
        currentRoleId = roleId;
        let conv = conversations.find(c=>c.roleId===roleId);
        currentConversationId = conv ? conv.id : createNewConversationForRole(roleId);
        await saveAll(); renderUI();
    }
    async function switchConversation(convId) {
        currentConversationId = convId;
        await saveAll(); renderMessages(); renderConvList(); updateHeaderInfo();
    }
    function createNewConversationForRole(roleId) {
        let id = 'conv_'+Date.now()+'_'+Math.random();
        conversations.push({ id, roleId, name: `对话 ${new Date().toLocaleTimeString()}`, messages: [] });
        saveAll();
        return id;
    }

    function renderMessages() {
        const conv = getCurrentConversation();
        if(!conv) return;
        messagesArea.innerHTML = '';
        conv.messages.forEach((msg, idx) => {
            const div = document.createElement('div');
            div.className = `message ${msg.role}`;
            div.innerHTML = `<div class="bubble">${escapeHtml(msg.content)}</div>
                <div class="msg-actions">
                    ${msg.role==='user'?`<button class="msg-action-btn edit-msg" data-idx="${idx}">✏️ 编辑</button>`:''}
                    <button class="msg-action-btn delete-msg" data-idx="${idx}">🗑️ 删除</button>
                    ${msg.role==='assistant'?`<button class="msg-action-btn regenerate-msg" data-idx="${idx}">🔄 重新生成</button>`:''}
                </div>`;
            messagesArea.appendChild(div);
        });
        document.querySelectorAll('.edit-msg').forEach(btn => btn.addEventListener('click', async (e)=>{ await editUserMessage(parseInt(btn.dataset.idx)); }));
        document.querySelectorAll('.delete-msg').forEach(btn => btn.addEventListener('click', async (e)=>{ await deleteMessageAndAfter(parseInt(btn.dataset.idx)); }));
        document.querySelectorAll('.regenerate-msg').forEach(btn => btn.addEventListener('click', async (e)=>{ await regenerateAssistantMessage(parseInt(btn.dataset.idx)); }));
        scrollToBottom();
    }

    async function editUserMessage(idx) {
        const conv = getCurrentConversation();
        if(conv.messages[idx]?.role !== 'user') return;
        let newContent = prompt('编辑消息', conv.messages[idx].content);
        if(newContent && newContent.trim()) {
            conv.messages[idx].content = newContent.trim();
            conv.messages = conv.messages.slice(0, idx+1);
            await saveAll();
            await sendRequestForLastMessage();
        }
    }
    async function deleteMessageAndAfter(idx) {
        const conv = getCurrentConversation();
        if(idx<0 || idx>=conv.messages.length) return;
        conv.messages = conv.messages.slice(0, idx);
        await saveAll();
        renderMessages();
    }
    async function regenerateAssistantMessage(idx) {
        const conv = getCurrentConversation();
        if(conv.messages[idx]?.role !== 'assistant') return;
        conv.messages = conv.messages.slice(0, idx);
        await saveAll();
        renderMessages();
        await sendRequestForLastMessage();
    }

    async function sendRequestForLastMessage() {
        const conv = getCurrentConversation();
        if(!conv.messages.length) return;
        if(!apiKey) { alert('请设置 API Key'); return; }
        const role = getCurrentRole();
        let systemPrompt = role.systemPrompt || '你是一个有用的助手。';
        const modeParams = getModeParams();
        systemPrompt += modeParams.extra_system;
        const history = conv.messages.map(m=>({role:m.role,content:m.content}));
        const apiMessages = [{role:'system',content:systemPrompt}, ...history];
        loadingDiv.style.display = 'flex';
        try {
            const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
                body:JSON.stringify({model:'deepseek-chat',messages:apiMessages,temperature:modeParams.temperature,max_tokens:modeParams.max_tokens})
            });
            if(!res.ok) throw new Error(`API错误: ${res.status}`);
            const data = await res.json();
            const reply = data.choices[0].message.content;
            conv.messages.push({ id:'msg_'+Date.now()+'_'+Math.random(), role:'assistant', content:reply });
            await saveAll();
            renderMessages();
        } catch(e) { alert('请求失败: '+e.message); }
        finally { loadingDiv.style.display = 'none'; }
    }

    async function sendMessage(userInput) {
        if(!userInput.trim() || !apiKey) { if(!apiKey) alert('请先设置 API Key'); return; }
        const conv = getCurrentConversation();
        conv.messages.push({ id:'msg_'+Date.now()+'_'+Math.random(), role:'user', content:userInput.trim() });
        await saveAll();
        renderMessages();
        messageInput.value = '';
        const role = getCurrentRole();
        let systemPrompt = role.systemPrompt || '你是一个有用的助手。';
        const modeParams = getModeParams();
        systemPrompt += modeParams.extra_system;
        const history = conv.messages.filter(m=>m.role!=='system').map(m=>({role:m.role,content:m.content}));
        const apiMessages = [{role:'system',content:systemPrompt}, ...history];
        loadingDiv.style.display = 'flex';
        try {
            const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
                body:JSON.stringify({model:'deepseek-chat',messages:apiMessages,temperature:modeParams.temperature,max_tokens:modeParams.max_tokens})
            });
            const data = await res.json();
            if(!res.ok) throw new Error(data.error?.message || '请求失败');
            conv.messages.push({ id:'msg_'+Date.now()+'_ai', role:'assistant', content:data.choices[0].message.content });
            await saveAll();
            renderMessages();
        } catch(e) { alert('错误: '+e.message); }
        finally { loadingDiv.style.display = 'none'; }
    }

    function openRoleModal(id=null) {
        editingRoleId = id;
        document.getElementById('roleModalTitle').innerText = id ? '编辑角色' : '新建角色';
        if(id) {
            let r = roles.find(r=>r.id===id);
            document.getElementById('roleName').value = r.name;
            document.getElementById('rolePrompt').value = r.systemPrompt;
            document.getElementById('roleAvatar').value = r.avatar || '';
        } else {
            document.getElementById('roleName').value = '';
            document.getElementById('rolePrompt').value = '';
            document.getElementById('roleAvatar').value = '🎭';
        }
        roleModal.classList.add('show');
    }
    async function saveRole() {
        let name = document.getElementById('roleName').value.trim();
        let prompt = document.getElementById('rolePrompt').value.trim();
        let avatar = document.getElementById('roleAvatar').value.trim() || '🎭';
        if(!name) { alert('角色名称不能为空'); return; }
        if(editingRoleId) {
            let r = roles.find(r=>r.id===editingRoleId);
            if(r) { r.name=name; r.systemPrompt=prompt; r.avatar=avatar; }
        } else {
            let newId = 'role_'+Date.now();
            roles.push({ id:newId, name, systemPrompt:prompt, avatar });
            conversations.push({ id:'conv_'+Date.now(), roleId:newId, name:'新对话', messages:[] });
        }
        await saveAll();
        renderUI();
        roleModal.classList.remove('show');
    }

    function scrollToBottom() { messagesArea.scrollTop = messagesArea.scrollHeight; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, m=> m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }

    // 主题切换（侧边栏）
    function initTheme() {
        const isDark = document.body.classList.contains('dark');
        themeBtnSide.innerText = isDark ? '☀️ 日间模式' : '🌙 夜间模式';
    }
    themeBtnSide.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        saveData(STORAGE_KEYS.THEME, isDark ? 'dark' : 'light');
        themeBtnSide.innerText = isDark ? '☀️ 日间模式' : '🌙 夜间模式';
    });

    // 备份导出/导入
    async function exportBackup() {
        let backup = { version:"1.0", exportDate:new Date().toISOString(), roles, conversations, currentRoleId, currentConversationId, mode:currentMode };
        let a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([JSON.stringify(backup,null,2)], {type:'application/json'}));
        a.download = `deepseek_backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
        alert("✅ 备份已导出");
    }
    async function importBackup(file) {
        let reader = new FileReader();
        reader.onload = async function(e) {
            try {
                let backup = JSON.parse(e.target.result);
                if(!backup.roles || !backup.conversations) throw new Error("格式错误");
                if(confirm("导入将覆盖现有数据，不可撤销！")) {
                    roles = backup.roles; conversations = backup.conversations;
                    currentRoleId = backup.currentRoleId; currentConversationId = backup.currentConversationId;
                    if(backup.mode) currentMode = backup.mode;
                    if(!roles.find(r=>r.id===currentRoleId)) currentRoleId = roles[0]?.id;
                    if(!conversations.find(c=>c.id===currentConversationId)) {
                        let first = conversations.find(c=>c.roleId===currentRoleId);
                        currentConversationId = first ? first.id : null;
                    }
                    await saveAll();
                    setMode(currentMode);
                    renderUI();
                    alert("✅ 恢复成功");
                }
            } catch(err) { alert("备份文件无效: "+err.message); }
        };
        reader.readAsText(file);
    }

    // 事件绑定
    menuBtn.onclick = () => sidebar.classList.add('open');
    closeSidebarBtn.onclick = () => sidebar.classList.remove('open');
    apiSettingsBtn.onclick = () => { document.getElementById('apiKeyInput').value = apiKey; apiModal.classList.add('show'); };
    document.getElementById('saveApiBtn').onclick = async () => { apiKey = document.getElementById('apiKeyInput').value; await saveData(STORAGE_KEYS.API_KEY, apiKey); apiModal.classList.remove('show'); };
    document.getElementById('closeApiBtn').onclick = () => apiModal.classList.remove('show');
    document.getElementById('confirmRoleBtn').onclick = saveRole;
    document.getElementById('cancelRoleBtn').onclick = () => roleModal.classList.remove('show');
    addRoleBtn.onclick = () => openRoleModal(null);
    newConvBtn.onclick = async () => { let newId = createNewConversationForRole(currentRoleId); currentConversationId = newId; await saveAll(); renderUI(); };
    sendBtn.onclick = () => sendMessage(messageInput.value);
    messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(messageInput.value); });
    exportBackupBtn.onclick = exportBackup;
    importBackupBtn.onclick = () => importFileInput.click();
    importFileInput.onchange = (e) => { if(e.target.files.length) importBackup(e.target.files[0]); importFileInput.value = ''; };
    document.querySelectorAll('.mode-btn-side').forEach(btn => btn.addEventListener('click', ()=> setMode(btn.dataset.mode)));

    // 解决键盘遮挡：点击输入框时滚动到底部
    messageInput.addEventListener('focus', () => { setTimeout(() => { messageInput.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100); });

    // 启动
    (async function() {
        await loadDataFromLocal();
        initTheme();
        setMode(currentMode);
        renderUI();
        window.addEventListener('beforeunload', () => saveAll());
    })();
</script>
</body>
</html>
