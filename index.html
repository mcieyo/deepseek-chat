<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>DeepSeek 智能伴侣 · 双模式 + 备份恢复</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #f7f7f8;
            --bg-secondary: #ffffff;
            --surface: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --user-bubble: #0084ff;
            --user-text: #ffffff;
            --assistant-bubble: #e5e5ea;
            --assistant-text: #1f2937;
            --accent: #10a37f;
            --danger: #ef4444;
            --shadow: 0 1px 2px rgba(0,0,0,0.05);
            --sidebar-bg: #ffffff;
        }

        body.dark {
            --bg-primary: #1e1e2f;
            --bg-secondary: #2a2a3a;
            --surface: #2a2a3a;
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --border: #3f3f4e;
            --user-bubble: #3b82f6;
            --user-text: #ffffff;
            --assistant-bubble: #3f3f4e;
            --assistant-text: #f3f4f6;
            --sidebar-bg: #252536;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.2s, color 0.2s;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            position: relative;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            z-index: 1000;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 2px 0 8px rgba(0,0,0,0.1);
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-sidebar {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .role-manager, .conversation-list, .backup-section {
            padding: 12px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            margin: 12px 0 8px 0;
            color: var(--text-secondary);
        }

        .role-item, .conv-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 6px;
            background: var(--bg-primary);
            transition: background 0.1s;
        }

        .role-item.active, .conv-item.active {
            background: var(--accent);
            color: white;
        }

        .role-name, .conv-name {
            flex: 1;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .role-actions, .conv-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            color: var(--text-secondary);
        }

        .add-btn {
            background: var(--accent);
            color: white;
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            margin-top: 8px;
            width: 100%;
        }

        .backup-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .backup-btn {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-primary);
            text-align: center;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        .chat-header {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
            gap: 8px;
            flex-wrap: wrap;
        }

        .menu-btn {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .mode-switch {
            display: flex;
            background: var(--bg-primary);
            border-radius: 32px;
            padding: 2px;
            border: 1px solid var(--border);
        }
        .mode-btn {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 28px;
            cursor: pointer;
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.2s;
            border: none;
        }
        .mode-btn.active {
            background: var(--accent);
            color: white;
        }

        .theme-toggle, .api-settings-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            position: relative;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.4;
        }

        .user .bubble {
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
        }

        .assistant .bubble {
            background: var(--assistant-bubble);
            color: var(--assistant-text);
            border-bottom-left-radius: 4px;
        }

        .msg-actions {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            justify-content: flex-end;
        }

        .assistant .msg-actions {
            justify-content: flex-start;
        }

        .msg-action-btn {
            background: none;
            border: none;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 4px;
        }

        .input-area {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        #sendBtn {
            background: var(--accent);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            background: var(--assistant-bubble);
            border-radius: 18px;
            width: fit-content;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .modal.show {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            background: var(--surface);
            width: 90%;
            max-width: 340px;
            border-radius: 24px;
            padding: 20px;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            margin: 12px 0;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        button {
            background: var(--accent);
            border: none;
            padding: 8px 16px;
            border-radius: 24px;
            color: white;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .mode-btn { padding: 4px 10px; font-size: 11px; }
            .chat-header { padding: 8px 12px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>📁 历史 & 角色</span>
            <button class="close-sidebar" id="closeSidebarBtn">✕</button>
        </div>
        <div class="role-manager">
            <div class="section-title">🎭 角色卡</div>
            <div id="roleList"></div>
            <button id="addRoleBtn" class="add-btn">+ 新建角色</button>
        </div>
        <div class="conversation-list">
            <div class="section-title">💬 对话历史</div>
            <div id="convList"></div>
            <button id="newConvBtn" class="add-btn">+ 新对话</button>
        </div>
        <!-- 新增备份恢复区 -->
        <div class="backup-section">
            <div class="section-title">💾 备份与恢复</div>
            <div class="backup-buttons">
                <button id="exportBackupBtn" class="backup-btn">📤 导出备份</button>
                <button id="importBackupBtn" class="backup-btn">📥 导入备份</button>
            </div>
            <input type="file" id="importFileInput" accept=".json" style="display:none;" />
            <div style="font-size: 11px; color: var(--text-secondary); margin-top: 8px; text-align: center;">
                定期导出备份，防止数据丢失
            </div>
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-header">
            <button class="menu-btn" id="menuBtn">☰</button>
            <div id="currentInfo" style="font-weight:500; font-size:14px; flex:1; min-width: 100px;"></div>
            <div class="mode-switch" id="modeSwitch">
                <button class="mode-btn" data-mode="fast">⚡ 快速</button>
                <button class="mode-btn" data-mode="deep">🧠 深度思考</button>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggleBtn">🌙</button>
                <button class="api-settings-btn" id="apiSettingsBtn">🔑</button>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="loading" id="loadingIndicator" style="display:none;">🤖 AI 思考中...</div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
            <button id="sendBtn">➤</button>
        </div>
    </div>
</div>

<!-- 模态框 API/角色编辑 -->
<div id="apiModal" class="modal">
    <div class="modal-content">
        <h3>DeepSeek API Key</h3>
        <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxx" autocomplete="off">
        <div class="modal-buttons">
            <button id="saveApiBtn">保存</button>
            <button id="closeApiBtn">取消</button>
        </div>
    </div>
</div>

<div id="roleModal" class="modal">
    <div class="modal-content">
        <h3 id="roleModalTitle">角色信息</h3>
        <input type="text" id="roleName" placeholder="角色名称">
        <textarea id="rolePrompt" rows="3" placeholder="系统提示词 (例如: 你是一个温柔的心理咨询师...)"></textarea>
        <input type="text" id="roleAvatar" placeholder="头像emoji (默认🤖)">
        <div class="modal-buttons">
            <button id="confirmRoleBtn">确认</button>
            <button id="cancelRoleBtn">取消</button>
        </div>
    </div>
</div>

<script>
    // ---------- 存储KEY ----------
    const STORAGE_KEYS = {
        ROLES: 'deepseek_roles',
        CONVERSATIONS: 'deepseek_conversations',
        CURRENT_ROLE_ID: 'deepseek_current_role',
        CURRENT_CONV_ID: 'deepseek_current_conv',
        API_KEY: 'deepseek_api_key',
        THEME: 'deepseek_theme',
        MODE: 'deepseek_mode'
    };

    const DEFAULT_ROLES = [
        { id: 'role_1', name: '默认助手', systemPrompt: '你是一个有帮助的AI助手。', avatar: '🤖' },
        { id: 'role_2', name: '诗人', systemPrompt: '你是一位浪漫的诗人，用优美的语言回答。', avatar: '📖' }
    ];

    let roles = [];
    let conversations = [];
    let currentRoleId = null;
    let currentConversationId = null;
    let apiKey = localStorage.getItem(STORAGE_KEYS.API_KEY) || '';
    let currentMode = localStorage.getItem(STORAGE_KEYS.MODE) || 'fast';

    // DOM 元素
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menuBtn');
    const closeSidebarBtn = document.getElementById('closeSidebarBtn');
    const themeToggle = document.getElementById('themeToggleBtn');
    const messagesArea = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const loadingDiv = document.getElementById('loadingIndicator');
    const roleListDiv = document.getElementById('roleList');
    const convListDiv = document.getElementById('convList');
    const addRoleBtn = document.getElementById('addRoleBtn');
    const newConvBtn = document.getElementById('newConvBtn');
    const apiSettingsBtn = document.getElementById('apiSettingsBtn');
    const currentInfoSpan = document.getElementById('currentInfo');
    const exportBackupBtn = document.getElementById('exportBackupBtn');
    const importBackupBtn = document.getElementById('importBackupBtn');
    const importFileInput = document.getElementById('importFileInput');

    const apiModal = document.getElementById('apiModal');
    const roleModal = document.getElementById('roleModal');
    let editingRoleId = null;

    // 模式相关函数
    function setMode(mode) {
        currentMode = mode;
        localStorage.setItem(STORAGE_KEYS.MODE, mode);
        document.querySelectorAll('.mode-btn').forEach(btn => {
            if (btn.dataset.mode === mode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function getModeParams() {
        if (currentMode === 'deep') {
            return { temperature: 0.3, max_tokens: 2048, extra_system: " 请你进行深度思考，分步骤推理，给出详细、透彻的解答。" };
        } else {
            return { temperature: 0.8, max_tokens: 1024, extra_system: " 请简洁高效地回答。" };
        }
    }

    // 数据保存/加载核心
    function saveAllToLocal() {
        localStorage.setItem(STORAGE_KEYS.ROLES, JSON.stringify(roles));
        localStorage.setItem(STORAGE_KEYS.CONVERSATIONS, JSON.stringify(conversations));
        localStorage.setItem(STORAGE_KEYS.CURRENT_ROLE_ID, currentRoleId);
        localStorage.setItem(STORAGE_KEYS.CURRENT_CONV_ID, currentConversationId);
        if (apiKey) localStorage.setItem(STORAGE_KEYS.API_KEY, apiKey);
    }

    function loadDataFromLocal() {
        const storedRoles = localStorage.getItem(STORAGE_KEYS.ROLES);
        if (storedRoles) roles = JSON.parse(storedRoles);
        else roles = DEFAULT_ROLES;

        const storedConvs = localStorage.getItem(STORAGE_KEYS.CONVERSATIONS);
        if (storedConvs) conversations = JSON.parse(storedConvs);
        else {
            conversations = [];
            roles.forEach(role => {
                conversations.push({
                    id: 'conv_' + Date.now() + '_' + role.id,
                    roleId: role.id,
                    name: '新对话',
                    messages: [],
                    createdAt: Date.now()
                });
            });
        }

        currentRoleId = localStorage.getItem(STORAGE_KEYS.CURRENT_ROLE_ID);
        if (!currentRoleId || !roles.find(r => r.id === currentRoleId)) {
            currentRoleId = roles[0]?.id;
        }
        currentConversationId = localStorage.getItem(STORAGE_KEYS.CURRENT_CONV_ID);
        let convValid = conversations.find(c => c.id === currentConversationId && c.roleId === currentRoleId);
        if (!convValid) {
            const firstConv = conversations.find(c => c.roleId === currentRoleId);
            if (firstConv) currentConversationId = firstConv.id;
            else {
                const newId = 'conv_' + Date.now();
                conversations.push({ id: newId, roleId: currentRoleId, name: '新对话', messages: [] });
                currentConversationId = newId;
            }
        }
        saveAllToLocal();
    }

    // 导出备份 (完整状态)
    function exportBackup() {
        const backupData = {
            version: "1.0",
            exportDate: new Date().toISOString(),
            roles: roles,
            conversations: conversations,
            currentRoleId: currentRoleId,
            currentConversationId: currentConversationId,
            mode: currentMode
        };
        const jsonStr = JSON.stringify(backupData, null, 2);
        const blob = new Blob([jsonStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `deepseek_backup_${new Date().toISOString().slice(0,19)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert("✅ 备份已导出，请妥善保存文件。");
    }

    // 导入备份 (完全替换当前数据)
    function importBackup(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const backup = JSON.parse(e.target.result);
                if (!backup.roles || !backup.conversations) {
                    throw new Error("备份文件格式不正确");
                }
                if (confirm("⚠️ 导入备份将覆盖当前所有角色、对话和设置，且不可撤销！是否继续？")) {
                    roles = backup.roles;
                    conversations = backup.conversations;
                    currentRoleId = backup.currentRoleId;
                    currentConversationId = backup.currentConversationId;
                    if (backup.mode) currentMode = backup.mode;
                    // 确保数据完整性：如果引用的角色或对话不存在，修复
                    if (!roles.find(r => r.id === currentRoleId)) currentRoleId = roles[0]?.id;
                    if (!conversations.find(c => c.id === currentConversationId)) {
                        const first = conversations.find(c => c.roleId === currentRoleId);
                        currentConversationId = first ? first.id : null;
                    }
                    saveAllToLocal();
                    setMode(currentMode);
                    renderUI();
                    alert("✅ 恢复成功！请刷新对话列表。");
                }
            } catch(err) {
                alert("❌ 备份文件无效: " + err.message);
            }
        };
        reader.readAsText(file);
    }

    // UI 渲染函数 (与之前相同，略作优化)
    function getCurrentConversation() { return conversations.find(c => c.id === currentConversationId); }
    function getCurrentRole() { return roles.find(r => r.id === currentRoleId); }

    function renderUI() {
        renderRoleList();
        renderConvList();
        renderMessages();
        const role = getCurrentRole();
        const conv = getCurrentConversation();
        currentInfoSpan.innerText = `${role?.avatar || '🎭'} ${role?.name || '角色'} · ${conv?.name || '对话'}`;
        setMode(currentMode);
    }

    function renderRoleList() {
        roleListDiv.innerHTML = '';
        roles.forEach(role => {
            const div = document.createElement('div');
            div.className = `role-item ${currentRoleId === role.id ? 'active' : ''}`;
            div.innerHTML = `
                <span class="role-name">${role.avatar || '👤'} ${role.name}</span>
                <div class="role-actions">
                    <button class="icon-btn edit-role" data-id="${role.id}">✏️</button>
                    <button class="icon-btn delete-role" data-id="${role.id}">🗑️</button>
                </div>
            `;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('edit-role') || e.target.classList.contains('delete-role')) return;
                switchRole(role.id);
            });
            roleListDiv.appendChild(div);
        });
        document.querySelectorAll('.edit-role').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                openRoleModal(id);
            });
        });
        document.querySelectorAll('.delete-role').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = btn.dataset.id;
                if (roles.length <= 1) { alert('至少保留一个角色'); return; }
                if (confirm('删除角色会同时删除其所有对话，确定吗？')) {
                    const newRoles = roles.filter(r => r.id !== id);
                    const remainConvs = conversations.filter(c => c.roleId !== id);
                    conversations = remainConvs;
                    roles = newRoles;
                    if (currentRoleId === id) {
                        currentRoleId = roles[0].id;
                        const firstConv = conversations.find(c => c.roleId === currentRoleId);
                        currentConversationId = firstConv ? firstConv.id : createNewConversationForRole(currentRoleId);
                    }
                    saveAllToLocal();
                    renderUI();
                }
            });
        });
    }

    function renderConvList() {
        convListDiv.innerHTML = '';
        const roleConvs = conversations.filter(c => c.roleId === currentRoleId);
        roleConvs.forEach(conv => {
            const div = document.createElement('div');
            div.className = `conv-item ${currentConversationId === conv.id ? 'active' : ''}`;
            div.innerHTML = `
                <span class="conv-name">💬 ${conv.name}</span>
                <div class="conv-actions">
                    <button class="icon-btn rename-conv" data-id="${conv.id}">✏️</button>
                    <button class="icon-btn delete-conv" data-id="${conv.id}">🗑️</button>
                </div>
            `;
            div.addEventListener('click', (e) => {
                if (e.target.classList.contains('rename-conv') || e.target.classList.contains('delete-conv')) return;
                switchConversation(conv.id);
            });
            convListDiv.appendChild(div);
        });
        document.querySelectorAll('.rename-conv').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const cid = btn.dataset.id;
                const newName = prompt('输入新名称', conversations.find(c => c.id === cid)?.name);
                if (newName) {
                    const conv = conversations.find(c => c.id === cid);
                    if (conv) conv.name = newName.slice(0, 20);
                    saveAllToLocal();
                    renderConvList();
                }
            });
        });
        document.querySelectorAll('.delete-conv').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const cid = btn.dataset.id;
                const roleConvsFilter = conversations.filter(c => c.roleId === currentRoleId);
                if (roleConvsFilter.length <= 1) { alert('每个角色至少保留一个对话'); return; }
                conversations = conversations.filter(c => c.id !== cid);
                if (currentConversationId === cid) {
                    const first = conversations.find(c => c.roleId === currentRoleId);
                    currentConversationId = first.id;
                }
                saveAllToLocal();
                renderUI();
            });
        });
    }

    function switchRole(roleId) {
        currentRoleId = roleId;
        let convForRole = conversations.find(c => c.roleId === roleId);
        if (!convForRole) {
            const newId = createNewConversationForRole(roleId);
            currentConversationId = newId;
        } else {
            currentConversationId = convForRole.id;
        }
        saveAllToLocal();
        renderUI();
    }

    function switchConversation(convId) {
        currentConversationId = convId;
        saveAllToLocal();
        renderMessages();
        renderConvList();
        const role = getCurrentRole();
        const conv = getCurrentConversation();
        currentInfoSpan.innerText = `${role?.avatar} ${role?.name} · ${conv?.name}`;
    }

    function createNewConversationForRole(roleId) {
        const newId = 'conv_' + Date.now() + '_' + Math.random();
        conversations.push({
            id: newId,
            roleId: roleId,
            name: `对话 ${new Date().toLocaleTimeString()}`,
            messages: [],
            createdAt: Date.now()
        });
        saveAllToLocal();
        return newId;
    }

    function renderMessages() {
        const conv = getCurrentConversation();
        if (!conv) return;
        messagesArea.innerHTML = '';
        conv.messages.forEach((msg, idx) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${msg.role}`;
            msgDiv.setAttribute('data-msg-id', msg.id);
            msgDiv.innerHTML = `
                <div class="bubble">${escapeHtml(msg.content)}</div>
                <div class="msg-actions">
                    ${msg.role === 'user' ? `<button class="msg-action-btn edit-msg" data-idx="${idx}">✏️ 编辑</button>` : ''}
                    <button class="msg-action-btn delete-msg" data-idx="${idx}">🗑️ 删除</button>
                    ${msg.role === 'assistant' ? `<button class="msg-action-btn regenerate-msg" data-idx="${idx}">🔄 重新生成</button>` : ''}
                </div>
            `;
            messagesArea.appendChild(msgDiv);
        });
        document.querySelectorAll('.edit-msg').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                editUserMessage(idx);
            });
        });
        document.querySelectorAll('.delete-msg').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                deleteMessageAndAfter(idx);
            });
        });
        document.querySelectorAll('.regenerate-msg').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.idx);
                regenerateAssistantMessage(idx);
            });
        });
        scrollToBottom();
    }

    function editUserMessage(idx) {
        const conv = getCurrentConversation();
        const msg = conv.messages[idx];
        if (!msg || msg.role !== 'user') return;
        const newContent = prompt('编辑消息内容', msg.content);
        if (!newContent || newContent.trim() === '') return;
        msg.content = newContent.trim();
        conv.messages = conv.messages.slice(0, idx + 1);
        saveAllToLocal();
        sendRequestForLastMessage();
    }

    function deleteMessageAndAfter(idx) {
        const conv = getCurrentConversation();
        if (idx < 0 || idx >= conv.messages.length) return;
        conv.messages = conv.messages.slice(0, idx);
        saveAllToLocal();
        renderMessages();
    }

    async function regenerateAssistantMessage(idx) {
        const conv = getCurrentConversation();
        const msg = conv.messages[idx];
        if (!msg || msg.role !== 'assistant') return;
        conv.messages = conv.messages.slice(0, idx);
        saveAllToLocal();
        renderMessages();
        await sendRequestForLastMessage();
    }

    async function sendRequestForLastMessage() {
        const conv = getCurrentConversation();
        if (!conv.messages.length) return;
        if (!apiKey) { alert('请先设置 DeepSeek API Key (点击右上角🔑)'); return; }
        const role = getCurrentRole();
        let systemPrompt = role.systemPrompt || '你是一个有用的助手。';
        const modeParams = getModeParams();
        systemPrompt += modeParams.extra_system;
        const historyMessages = conv.messages.map(m => ({ role: m.role, content: m.content }));
        const apiMessages = [{ role: 'system', content: systemPrompt }, ...historyMessages];
        loadingDiv.style.display = 'flex';
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: apiMessages,
                    temperature: modeParams.temperature,
                    max_tokens: modeParams.max_tokens,
                    stream: false
                })
            });
            if (!response.ok) throw new Error(`API错误: ${response.status}`);
            const data = await response.json();
            const reply = data.choices[0].message.content;
            conv.messages.push({ id: 'msg_' + Date.now() + '_' + Math.random(), role: 'assistant', content: reply, timestamp: Date.now() });
            saveAllToLocal();
            renderMessages();
        } catch (error) { alert('请求失败: ' + error.message); }
        finally { loadingDiv.style.display = 'none'; }
    }

    async function sendMessage(userInput) {
        if (!userInput.trim()) return;
        if (!apiKey) { alert('请先设置 DeepSeek API Key'); return; }
        const conv = getCurrentConversation();
        const role = getCurrentRole();
        const userMsg = { id: 'msg_' + Date.now(), role: 'user', content: userInput, timestamp: Date.now() };
        conv.messages.push(userMsg);
        saveAllToLocal();
        renderMessages();
        messageInput.value = '';

        const modeParams = getModeParams();
        let systemPrompt = role.systemPrompt || '你是一个有用的助手。';
        systemPrompt += modeParams.extra_system;
        const historyMessages = conv.messages.filter(m => m.role !== 'system').map(m => ({ role: m.role, content: m.content }));
        const apiMessages = [{ role: 'system', content: systemPrompt }, ...historyMessages];
        loadingDiv.style.display = 'flex';
        try {
            const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({ model: 'deepseek-chat', messages: apiMessages, temperature: modeParams.temperature, max_tokens: modeParams.max_tokens })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || '请求失败');
            const reply = data.choices[0].message.content;
            conv.messages.push({ id: 'msg_' + Date.now() + '_ai', role: 'assistant', content: reply, timestamp: Date.now() });
            saveAllToLocal();
            renderMessages();
        } catch (err) { alert('错误: ' + err.message); }
        finally { loadingDiv.style.display = 'none'; }
    }

    function openRoleModal(roleId = null) {
        editingRoleId = roleId;
        document.getElementById('roleModalTitle').innerText = roleId ? '编辑角色' : '新建角色';
        if (roleId) {
            const role = roles.find(r => r.id === roleId);
            document.getElementById('roleName').value = role.name;
            document.getElementById('rolePrompt').value = role.systemPrompt;
            document.getElementById('roleAvatar').value = role.avatar || '';
        } else {
            document.getElementById('roleName').value = '';
            document.getElementById('rolePrompt').value = '';
            document.getElementById('roleAvatar').value = '🎭';
        }
        roleModal.classList.add('show');
    }

    function saveRole() {
        const name = document.getElementById('roleName').value.trim();
        const prompt = document.getElementById('rolePrompt').value.trim();
        const avatar = document.getElementById('roleAvatar').value.trim() || '🎭';
        if (!name) { alert('角色名称不能为空'); return; }
        if (editingRoleId) {
            const role = roles.find(r => r.id === editingRoleId);
            if (role) { role.name = name; role.systemPrompt = prompt; role.avatar = avatar; }
        } else {
            const newId = 'role_' + Date.now();
            roles.push({ id: newId, name, systemPrompt: prompt, avatar });
            const newConvId = 'conv_' + Date.now();
            conversations.push({ id: newConvId, roleId: newId, name: '新对话', messages: [] });
        }
        saveAllToLocal();
        renderUI();
        roleModal.classList.remove('show');
    }

    function scrollToBottom() { messagesArea.scrollTop = messagesArea.scrollHeight; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m;}); }

    // 主题
    function initTheme() {
        const savedTheme = localStorage.getItem(STORAGE_KEYS.THEME);
        if (savedTheme === 'dark') document.body.classList.add('dark');
        themeToggle.innerText = document.body.classList.contains('dark') ? '☀️' : '🌙';
    }
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem(STORAGE_KEYS.THEME, isDark ? 'dark' : 'light');
        themeToggle.innerText = isDark ? '☀️' : '🌙';
    });

    // 事件绑定
    menuBtn.onclick = () => sidebar.classList.add('open');
    closeSidebarBtn.onclick = () => sidebar.classList.remove('open');
    apiSettingsBtn.onclick = () => apiModal.classList.add('show');
    document.getElementById('saveApiBtn').onclick = () => {
        apiKey = document.getElementById('apiKeyInput').value;
        localStorage.setItem(STORAGE_KEYS.API_KEY, apiKey);
        apiModal.classList.remove('show');
    };
    document.getElementById('closeApiBtn').onclick = () => apiModal.classList.remove('show');
    document.getElementById('confirmRoleBtn').onclick = saveRole;
    document.getElementById('cancelRoleBtn').onclick = () => roleModal.classList.remove('show');
    addRoleBtn.onclick = () => openRoleModal(null);
    newConvBtn.onclick = () => {
        const newId = createNewConversationForRole(currentRoleId);
        currentConversationId = newId;
        saveAllToLocal();
        renderUI();
    };
    sendBtn.onclick = () => sendMessage(messageInput.value);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(messageInput.value); });
    document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.addEventListener('click', (e) => { setMode(btn.dataset.mode); });
    });

    // 备份按钮
    exportBackupBtn.onclick = exportBackup;
    importBackupBtn.onclick = () => importFileInput.click();
    importFileInput.onchange = (e) => {
        if (e.target.files.length) importBackup(e.target.files[0]);
        importFileInput.value = '';
    };

    // 启动
    loadDataFromLocal();
    initTheme();
    setMode(currentMode);
    renderUI();
</script>
</body>
</html>
